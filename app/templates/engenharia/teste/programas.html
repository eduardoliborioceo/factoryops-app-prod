{% extends "layouts/app.html" %}
{% block title %}Programas de Teste — Engenharia{% endblock %}

{% block page_title %}
<div class="page-header">
  <div class="page-header-title">
    <span class="page-header-section">Engenharia · Teste</span>
    <h1 class="page-header-name">Programas de Teste</h1>
  </div>
  <div class="page-header-actions">
    <a href="{{ url_for('pages.eng_hub') }}#teste" class="btn-header-icon" title="Voltar">
      <i class="bi bi-arrow-left"></i>
    </a>
    <button class="btn-header-icon" onclick="toggleFullscreen()" title="Tela cheia">
      <i class="bi bi-arrows-fullscreen"></i>
    </button>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="text-center py-5">
    <i class="bi bi-file-code" style="font-size:2.5rem;opacity:0.25;display:block;margin-bottom:12px;"></i>
    <p style="color:var(--text-muted);font-size:0.875rem;margin:0;">Em desenvolvimento.<br>Controle de versões e parâmetros dos programas de teste.</p>
  </div>
</div>
{% endblock %}
