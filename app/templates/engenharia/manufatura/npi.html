{% extends "layouts/app.html" %}
{% block title %}NPI — Engenharia{% endblock %}

{% block styles %}
<style>
.npi-card { background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px; }
.npi-hdr  { display:flex;align-items:center;justify-content:space-between;padding:12px 18px;
  border-bottom:1px solid var(--border);background:rgba(15,23,42,0.03);font-size:0.875rem;font-weight:700; }
.npi-body { padding:16px 18px; }
.phase-row { display:grid;grid-template-columns:200px 1fr 100px;gap:12px;align-items:start;
  padding:14px 0;border-bottom:1px solid var(--border); }
.phase-row:last-child { border-bottom:none; }
.phase-badge { width:120px;padding:6px 10px;border-radius:8px;text-align:center;
  font-size:0.82rem;font-weight:700; }
.phase-1 { background:rgba(13,110,253,0.12);color:#084298; }
.phase-2 { background:rgba(111,66,193,0.12);color:#3d1a7a; }
.phase-3 { background:rgba(253,126,20,0.15);color:#8a3d00; }
.phase-4 { background:rgba(25,135,84,0.12);color:#0a3622; }
.phase-5 { background:rgba(15,23,42,0.08);color:var(--text); }
.phase-name { font-size:0.88rem;font-weight:700;margin-bottom:3px; }
.phase-desc { font-size:0.75rem;color:var(--text-muted); }
.checklist-item { display:flex;align-items:flex-start;gap:10px;padding:5px 0; }
.checklist-item label { font-size:0.8rem;cursor:pointer;display:flex;align-items:flex-start;gap:8px; }
.checklist-item input[type=checkbox] { margin-top:2px;flex-shrink:0;width:16px;height:16px;cursor:pointer; }
.phase-progress-wrap { height:8px;border-radius:4px;background:rgba(15,23,42,0.08);overflow:hidden;margin-top:6px; }
.phase-progress { height:100%;border-radius:4px;transition:width 0.3s; }
.gate-select { width:100%;border:1px solid var(--border);border-radius:6px;
  font-size:0.78rem;padding:5px 7px;background:var(--card);color:var(--text); }
.gate-select:focus { outline:none;border-color:#0d6efd; }
.gate-nstart { background:rgba(15,23,42,0.08);color:var(--text-muted); }
.gate-inprog  { background:rgba(13,110,253,0.12);color:#084298; }
.gate-done    { background:rgba(25,135,84,0.12);color:#0a3622; }
.gate-blocked { background:rgba(220,53,69,0.12);color:#9b1e27; }
.npi-kpi-bar { display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap; }
.npi-kpi { background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;text-align:center;min-width:100px; }
.npi-kpi-val { font-size:1.3rem;font-weight:800;color:var(--text); }
.npi-kpi-lbl { font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted); }
@media (max-width:767px) { .phase-row { grid-template-columns:1fr; } }
@media print { .no-print { display:none!important; } }
</style>
{% endblock %}

{% block page_title %}
<div class="page-header">
  <div class="page-header-title">
    <span class="page-header-section">Engenharia · Manufatura</span>
    <h1 class="page-header-name">NPI — Introdução de Novos Produtos</h1>
  </div>
  <div class="page-header-actions">
    <button class="btn-header-icon" onclick="toggleFullscreen()" title="Tela cheia">
      <i class="bi bi-arrows-fullscreen"></i>
    </button>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="container-fluid">

  <div class="npi-card">
    <div class="npi-hdr">
      <div class="d-flex align-items-center gap-2">
        <button class="btn-header-icon no-print" onclick="history.back()" title="Voltar">
          <i class="bi bi-arrow-left"></i>
        </button>
        <span><i class="bi bi-box-seam text-primary me-1"></i>Identificação do Projeto NPI</span>
      </div>
      <div class="d-flex gap-2 no-print">
        <button class="btn-header-icon" onclick="window.print()" title="Imprimir">
          <i class="bi bi-printer"></i>
        </button>
        <button class="btn btn-primary btn-sm" onclick="saveData()">
          <i class="bi bi-save me-1"></i>Salvar
        </button>
      </div>
    </div>
    <div class="npi-body">
      <div class="row g-2 mb-3 align-items-end">
        <div class="col-12 col-md-4">
          <label class="form-label fw-semibold" style="font-size:0.78rem;">Produto / Projeto</label>
          <input id="npiNome" type="text" class="form-control form-control-sm" placeholder="Ex: PCBA Harman Gen3">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-semibold" style="font-size:0.78rem;">Cliente</label>
          <input id="npiCliente" type="text" class="form-control form-control-sm" placeholder="Nome do cliente">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-semibold" style="font-size:0.78rem;">Responsável</label>
          <input id="npiResp" type="text" class="form-control form-control-sm" placeholder="Eng. responsável">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-semibold" style="font-size:0.78rem;">Início</label>
          <input id="npiInicio" type="date" class="form-control form-control-sm">
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-semibold" style="font-size:0.78rem;">SOP alvo</label>
          <input id="npiSOP" type="date" class="form-control form-control-sm">
        </div>
      </div>
      <div id="saveMsg" style="font-size:0.8rem;" class="mb-2"></div>
      <div class="npi-kpi-bar" id="kpiBar"></div>
    </div>
  </div>

  <!-- Fases NPI -->
  <div class="npi-card">
    <div class="npi-hdr">
      <span><i class="bi bi-list-check me-2"></i>Gates & Fases</span>
    </div>
    <div class="npi-body" style="padding-top:0;" id="phasesArea"></div>
  </div>

</div>
<script>
(function(){
  "use strict";
  const SK="eng_npi";
  const PHASES = [
    { key:"conceito", label:"Fase 1 — Conceito", cls:"phase-1", icon:"bi-lightbulb",
      items:["Briefing do cliente recebido","Especificações técnicas definidas","Análise de viabilidade técnica concluída",
        "Análise de viabilidade financeira concluída","BOM preliminar elaborada","Estimativa de prazo e recursos aprovada"] },
    { key:"design", label:"Fase 2 — Design", cls:"phase-2", icon:"bi-pencil-square",
      items:["Esquemático elétrico finalizado","Layout de PCB aprovado","DFM/DFA concluído","Revisão de Design (DR) realizada",
        "Especificações de teste definidas","Aprovação do cliente recebida"] },
    { key:"prototipo", label:"Fase 3 — Protótipo", cls:"phase-3", icon:"bi-cpu",
      items:["Amostras de protótipo fabricadas","Testes funcionais realizados","Identificação e correção de NCs",
        "Validação de montabilidade concluída","Análise de falhas documentada","Decisão de avançar para piloto"] },
    { key:"piloto", label:"Fase 4 — Piloto", cls:"phase-4", icon:"bi-play-circle",
      items:["Linha de produção configurada","Treinamento de operadores concluído","Processo de teste validado",
        "Yield de piloto ≥ meta estabelecida","Documentação técnica (ITs, roteiros) emitida","Aprovação de PPAP/FAI completada"] },
    { key:"producao", label:"Fase 5 — Produção (SOP)", cls:"phase-5", icon:"bi-check-circle",
      items:["Transferência para produção série realizada","Todos os documentos aprovados e em vigor",
        "KPIs de qualidade dentro da meta","Monitoramento pós-SOP ativo","Lição aprendida registrada"] },
  ];
  const GATES=["Não iniciado","Em andamento","Concluído","Bloqueado"];
  const GATE_CLS={"Não iniciado":"gate-nstart","Em andamento":"gate-inprog","Concluído":"gate-done","Bloqueado":"gate-blocked"};

  let state = {};

  function buildPhases() {
    const area=document.getElementById("phasesArea");
    area.innerHTML="";
    PHASES.forEach(ph=>{
      const phData=state[ph.key]||{gate:"Não iniciado",checks:{}};
      const gateOpts=GATES.map(g=>`<option${g===phData.gate?" selected":""}>${g}</option>`).join("");
      const items=ph.items.map((it,i)=>{
        const chkd=phData.checks&&phData.checks[i];
        return `<div class="checklist-item">
          <label>
            <input type="checkbox" data-phase="${ph.key}" data-idx="${i}" ${chkd?"checked":""} onchange="onCheck('${ph.key}',${i},this.checked)">
            ${it}
          </label>
        </div>`;
      }).join("");
      const done=ph.items.filter((_,i)=>phData.checks&&phData.checks[i]).length;
      const pct=Math.round((done/ph.items.length)*100);
      const barColor=ph.cls==="phase-1"?"#0d6efd":ph.cls==="phase-2"?"#6f42c1":ph.cls==="phase-3"?"#fd7e14":ph.cls==="phase-4"?"#198754":"#64748b";
      area.innerHTML+=`
        <div class="phase-row" id="phrow-${ph.key}">
          <div>
            <div class="phase-badge ${ph.cls} mb-2"><i class="bi ${ph.icon} me-1"></i>${ph.label.split(" — ")[0]}</div>
            <div class="phase-name">${ph.label.split(" — ")[1]}</div>
            <div style="margin-top:6px;">
              <select class="gate-select ${GATE_CLS[phData.gate]||""}" onchange="onGate('${ph.key}',this)">
                ${gateOpts}
              </select>
            </div>
            <div style="margin-top:8px;font-size:0.72rem;color:var(--text-muted);">${done}/${ph.items.length} itens (${pct}%)</div>
            <div class="phase-progress-wrap" style="margin-top:4px;">
              <div class="phase-progress" style="width:${pct}%;background:${barColor};"></div>
            </div>
          </div>
          <div>${items}</div>
          <div style="font-size:0.75rem;color:var(--text-muted);" id="phnote-${ph.key}"></div>
        </div>`;
    });
    updateKpis();
  }

  function onCheck(phKey, idx, chkd) {
    if(!state[phKey]) state[phKey]={gate:"Não iniciado",checks:{}};
    state[phKey].checks[idx]=chkd;
    const ph=PHASES.find(p=>p.key===phKey);
    const done=ph.items.filter((_,i)=>state[phKey].checks[i]).length;
    const pct=Math.round((done/ph.items.length)*100);
    const barColor={"phase-1":"#0d6efd","phase-2":"#6f42c1","phase-3":"#fd7e14","phase-4":"#198754","phase-5":"#64748b"}[ph.cls]||"#64748b";
    const row=document.getElementById("phrow-"+phKey);
    if(row){
      const bar=row.querySelector(".phase-progress");
      if(bar) bar.style.width=pct+"%";
      const barWrap=row.querySelector(".phase-progress-wrap");
      if(barWrap){ const prev=barWrap.previousElementSibling; if(prev&&prev.tagName==="DIV") prev.textContent=`${done}/${ph.items.length} itens (${pct}%)`; }
    }
    updateKpis();
  }
  window.onCheck=onCheck;

  function onGate(phKey, sel) {
    if(!state[phKey]) state[phKey]={gate:"Não iniciado",checks:{}};
    state[phKey].gate=sel.value;
    sel.className="gate-select "+(GATE_CLS[sel.value]||"");
    updateKpis();
  }
  window.onGate=onGate;

  function updateKpis() {
    let totalItems=0, doneItems=0, phasesComplete=0;
    PHASES.forEach(ph=>{
      const phD=state[ph.key]||{};
      ph.items.forEach((_,i)=>{ totalItems++; if(phD.checks&&phD.checks[i]) doneItems++; });
      if(phD.gate==="Concluído") phasesComplete++;
    });
    const pct=totalItems>0?Math.round((doneItems/totalItems)*100):0;
    const currentPhase=PHASES.filter(ph=>state[ph.key]&&state[ph.key].gate==="Em andamento").map(p=>p.label.split(" — ")[1]).join(", ")||"—";
    document.getElementById("kpiBar").innerHTML=`
      <div class="npi-kpi"><div class="npi-kpi-val">${phasesComplete}/5</div><div class="npi-kpi-lbl">Fases Concluídas</div></div>
      <div class="npi-kpi"><div class="npi-kpi-val">${doneItems}/${totalItems}</div><div class="npi-kpi-lbl">Itens OK</div></div>
      <div class="npi-kpi"><div class="npi-kpi-val" style="color:${pct>=80?"#198754":pct>=50?"#fd7e14":"#dc3545"};">${pct}%</div><div class="npi-kpi-lbl">Completude</div></div>
      <div class="npi-kpi" style="min-width:200px;"><div class="npi-kpi-lbl">Em andamento</div><div style="font-size:0.85rem;font-weight:600;margin-top:4px;">${currentPhase}</div></div>
    `;
  }

  function saveData() {
    const phaseState={};
    PHASES.forEach(ph=>{
      phaseState[ph.key]={gate:state[ph.key]?.gate||"Não iniciado",checks:state[ph.key]?.checks||{}};
    });
    localStorage.setItem(SK,JSON.stringify({
      nome:document.getElementById("npiNome").value,cliente:document.getElementById("npiCliente").value,
      resp:document.getElementById("npiResp").value,inicio:document.getElementById("npiInicio").value,
      sop:document.getElementById("npiSOP").value,phases:phaseState
    }));
    const m=document.getElementById("saveMsg");
    m.innerHTML=`<span class="text-success fw-semibold"><i class="bi bi-check-circle me-1"></i>Salvo em ${new Date().toLocaleTimeString("pt-BR")}</span>`;
    setTimeout(()=>m.innerHTML="",3000);
  }
  window.saveData=saveData;

  document.addEventListener("DOMContentLoaded",()=>{
    try {
      const d=JSON.parse(localStorage.getItem(SK)||"{}");
      if(d.nome)    document.getElementById("npiNome").value=d.nome;
      if(d.cliente) document.getElementById("npiCliente").value=d.cliente;
      if(d.resp)    document.getElementById("npiResp").value=d.resp;
      if(d.inicio)  document.getElementById("npiInicio").value=d.inicio;
      if(d.sop)     document.getElementById("npiSOP").value=d.sop;
      if(d.phases)  state=d.phases;
    } catch(e){}
    buildPhases();
    document.getElementById("npiInicio").value=document.getElementById("npiInicio").value||new Date().toISOString().slice(0,10);
  });
})();
</script>
{% endblock %}
