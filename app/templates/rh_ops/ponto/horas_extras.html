{% extends "layouts/app.html" %}
{% block title %}Horas Extras — RH Hub{% endblock %}

{% block page_title %}
<div class="page-header">
  <div class="page-header-title">
    <span class="page-header-section">RH Hub · Ponto & Frequência</span>
    <h1 class="page-header-name">Horas Extras</h1>
  </div>
  <div class="page-header-actions">
    <button class="btn-header-icon" onclick="toggleFullscreen()" title="Tela cheia">
      <i class="bi bi-arrows-fullscreen"></i>
    </button>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="container-fluid">

  <div class="mb-3">
    <a href="{{ url_for('pages.rh_ops_hub') }}#operacao" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Voltar ao RH Hub
    </a>
  </div>
  <div class="text-center py-5">
    <i class="bi bi-plus-circle" style="font-size:2.5rem;opacity:0.25;display:block;margin-bottom:12px;"></i>
    <p style="color:var(--text-muted);font-size:0.875rem;margin:0;">Em desenvolvimento.<br>Aprovação e histórico de horas extras por colaborador.</p>
  </div>
</div>
{% endblock %}
